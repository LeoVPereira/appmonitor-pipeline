name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  # Ativando logs de debug para maior detalhamento nos runners
  ACTIONS_STEP_DEBUG: true

jobs:
  validate:
    name: Validate Script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar sintaxe do script
        run: |
          bash -n status-check.sh
          # Exemplo de anotação de aviso
          echo "::warning title=Aviso de Validação::A sintaxe está correta, mas lembre-se de validar a lógica de negócio."

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Simular testes
        run: |
          echo "Running tests..."
          # Exemplo de anotação de erro (simulada para não quebrar o pipeline)
          echo "::error title=Alerta de Teste::Um comportamento inesperado foi detectado nos testes simulados."
          exit 0

  package:
    name: Package Report
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar artefato report.zip
        run: |
          echo "Relatório de simulacao de testes." > relatorio.txt
          zip report.zip relatorio.txt status-check.sh

      - name: Fazer upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: report-artifact
          path: report.zip

      - name: Gerar Job Summary
        run: |
          echo "### Resumo da Execução do Pipeline AppMonitor" >> $GITHUB_STEP_SUMMARY
          echo "- **Sistema Operacional do Runner:** ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch/Ref executada:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resultado dos Steps:** Validação e Testes concluídos." >> $GITHUB_STEP_SUMMARY
          echo "- **Artefato gerado:** O pacote foi enviado com sucesso." >> $GITHUB_STEP_SUMMARY
          echo "> *Nota: Baixe o arquivo na seção 'Artifacts' abaixo.*" >> $GITHUB_STEP_SUMMARY