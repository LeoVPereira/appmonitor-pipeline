name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar sintaxe do script
        run: bash -n status-check.sh

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Simular testes
        run: echo "Running tests" && exit 0

  package:
    name: Package Report
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar artefato report.zip
        run: |
          echo "Relatório de simulacao de testes." > relatorio.txt
          zip report.zip relatorio.txt status-check.sh

      - name: Fazer upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: report-artifact
          path: report.zip